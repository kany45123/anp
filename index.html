<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ANP Quiz</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-user-select: none;
  user-select: none;
}
html, body {
  width: 100%;
  height: 100%;
  touch-action: manipulation;
}
body {
  background: #0a1628;
  color: #f5f0e8;
  font-family: Arial, sans-serif;
  padding: 12px;
  font-size: 16px;
}
.header {
  text-align: center;
  margin-bottom: 20px;
}
h1 {
  color: #c9a84c;
  font-size: 26px;
  margin-bottom: 5px;
}
.header p {
  font-size: 13px;
  color: #999;
}
#menu {
  max-width: 100%;
  margin: 0 auto;
}
.section {
  margin: 15px 0;
}
.section-label {
  font-size: 11px;
  color: #c9a84c;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
  font-weight: bold;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
}
@media(max-width: 480px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}
.card {
  background: #112240;
  border: 2px solid #c9a84c;
  padding: 16px 10px;
  margin: 0;
  border-radius: 6px;
  text-align: center;
  font-size: 15px;
  font-weight: 500;
  min-height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: background-color 0.15s, border-color 0.15s;
  word-wrap: break-word;
}
.card.active {
  background: #1a3a52;
  border-color: #e8c96b;
  box-shadow: 0 0 10px #c9a84c;
}
button {
  background: #c9a84c;
  color: #0a1628;
  border: none;
  padding: 16px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 16px;
  width: 100%;
  min-height: 56px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  transition: background-color 0.15s;
}
button:active {
  background: #e8c96b;
}
#quiz {
  display: none;
}
.progress {
  width: 100%;
  height: 8px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 4px;
  margin-bottom: 15px;
  overflow: hidden;
}
.bar {
  height: 100%;
  background: #c9a84c;
  width: 0%;
  transition: width 0.3s;
}
.question {
  background: #112240;
  border-left: 4px solid #c9a84c;
  padding: 16px;
  margin: 15px 0;
  border-radius: 6px;
  line-height: 1.6;
  font-size: 15px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.options {
  margin: 12px 0;
}
.option {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 14px;
  margin: 8px 0;
  cursor: pointer;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1.5;
  word-wrap: break-word;
  overflow-wrap: break-word;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 56px;
  display: flex;
  align-items: center;
  transition: background-color 0.15s, border-color 0.15s;
}
.option:active {
  border-color: #c9a84c;
  background: rgba(201, 168, 76, 0.2);
}
.option.correct {
  background: rgba(26, 122, 74, 0.3);
  border-color: #6ee7a8;
}
.option.wrong {
  background: rgba(192, 57, 43, 0.3);
  border-color: #ff6b6b;
}
.option.disabled {
  opacity: 0.6;
  cursor: not-allowed;
  pointer-events: none;
}
.feedback {
  padding: 12px;
  margin: 10px 0;
  border-radius: 4px;
  font-size: 14px;
  display: none;
  word-wrap: break-word;
}
.feedback.show {
  display: block;
}
.feedback.ok {
  background: rgba(26, 122, 74, 0.2);
  color: #6ee7a8;
  border-left: 4px solid #6ee7a8;
}
.feedback.ko {
  background: rgba(192, 57, 43, 0.2);
  color: #ff6b6b;
  border-left: 4px solid #ff6b6b;
}
.next-btn {
  display: none;
  margin-top: 16px;
}
.next-btn.show {
  display: block;
}
#results {
  display: none;
  text-align: center;
}
#results h2 {
  font-size: 22px;
  margin-bottom: 15px;
}
.score {
  font-size: 48px;
  color: #c9a84c;
  margin: 20px 0;
  font-weight: bold;
}
.stat {
  background: #112240;
  padding: 16px;
  border-radius: 6px;
  border-left: 4px solid #c9a84c;
  margin: 12px 0;
}
.stat-v {
  font-size: 32px;
  color: #c9a84c;
  font-weight: bold;
}
.review {
  text-align: left;
  margin-top: 20px;
}
.review-i {
  background: #112240;
  padding: 12px;
  margin: 8px 0;
  border-left: 4px solid #666;
  border-radius: 4px;
  font-size: 13px;
  line-height: 1.5;
  word-wrap: break-word;
}
.review-i.ok {
  border-left-color: #6ee7a8;
}
.review-i.ko {
  border-left-color: #ff6b6b;
}
.meta {
  color: #999;
  font-size: 13px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<div class="header">
  <h1>📚 ANP Quiz</h1>
  <p>Examen oficial Târgu Ocna</p>
</div>

<div id="menu">
  <div class="section">
    <div class="section-label">Alege disciplina</div>
    <div class="grid">
      <div class="card active" id="d-romana">🇷🇴 Română</div>
      <div class="card" id="d-istorie">📖 Istorie</div>
      <div class="card" id="d-ambele">📋 Ambele</div>
    </div>
  </div>
  
  <div class="section">
    <div class="section-label">Alege testul</div>
    <div class="grid" id="test-options"></div>
  </div>
  
  <button id="start-btn">Începe →</button>
</div>

<div id="quiz">
  <div class="progress"><div class="bar" id="pb"></div></div>
  <div class="meta"><span id="ct">1/10</span></div>
  <div class="question" id="qt"></div>
  <div class="options" id="an"></div>
  <div class="feedback" id="fb"></div>
  <button class="next-btn" id="next-btn">Următoarea →</button>
</div>

<div id="results">
  <h2>Rezultate</h2>
  <div class="score" id="sc">0 / 10</div>
  <div class="stat">
    <div class="stat-v" id="sv">0</div>
    <div>Răspunsuri corecte</div>
  </div>
  <div class="review">
    <h3>Răspunsuri</h3>
    <div id="rv"></div>
  </div>
  <button id="back-btn">← Înapoi</button>

</div>

  {q:"Conform Convenției de la Paris numele noului stat creat era:", o:["România","Principatele române","Regatul România","Principatele Unite ale Moldovei și Țării Românești"], a:2},
  {q:"Primele universități din Principatele Unite au fost înfiin țate în orașele:", o:["Iași și Bucuresti","Iași și Târgoviște","Bucuresti și Suceava","Iași și Pitești"], a:0},
  {q:"Membrii Înțelegerii Balcanice, creată la 9 februarie 1934 au fost:", o:["România, Iugoslavia, Grecia și Turcia","România,Iugoslavia, Bulgaria și Albania","România, Iugoslavia, Grecia și Albania","Croația, Muntenegru, Macedonia și Grecia"], a:0},
  {q:"Carol I a fost rege al României în perioada cuprinsă intre anii:", o:["1866 - 1914","1866 - 1877","1881 - 1914","1878 - 1914"], a:3},
  {q:"La 26 iunie 1940 ministrul de externe sovietic Molotov a inm ântat ministrului român de la Moscova un ultimatum prin care cerea cedarea:", o:["Cadrilaterului","Nord - Vestul Transilvanie","Basarabiei și a Bucovinei de Nord","Maramureșului"], a:2}
];

let discipline = 'romana';
let testSize = 10;
let questions = [];
let current = 0;
let score = 0;
let history = [];
let answered = false;

function setupEventListeners() {
  document.getElementById('d-romana').addEventListener('click', () => selectDiscipline('romana'));
  document.getElementById('d-istorie').addEventListener('click', () => selectDiscipline('istorie'));
  document.getElementById('d-ambele').addEventListener('click', () => selectDiscipline('ambele'));
  document.getElementById('start-btn').addEventListener('click', startQuiz);
  document.getElementById('next-btn').addEventListener('click', nextQuestion);
  document.getElementById('back-btn').addEventListener('click', goBack);
  document.getElementById('retry-btn').addEventListener('click', startQuiz);
}

function selectDiscipline(d) {
  discipline = d;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
  document.getElementById('d-' + d).classList.add('active');
  updateTestOptions();
}

function updateTestOptions() {
  const container = document.getElementById('test-options');
  container.innerHTML = '';
  
  let tests = [];
  if (discipline === 'romana') tests = [10, 20, 45];
  else if (discipline === 'istorie') tests = [10, 20, 30];
  else tests = [10, 20, 75];
  
  tests.forEach(t => {
    const card = document.createElement('div');
    card.className = 'card' + (t === testSize ? ' active' : '');
    card.textContent = t === 75 ? '📊 75' : t === 45 ? '📋 45' : t === 30 ? '📖 30' : (t === 20 ? '⏱️ 20' : '⚡ 10');
    card.addEventListener('click', () => selectTest(t, card));
    container.appendChild(card);
  });
}

function selectTest(size, element) {
  testSize = size;
  document.querySelectorAll('#test-options .card').forEach(c => c.classList.remove('active'));
  element.classList.add('active');
}

function shuffle(arr) {
  const newArr = [...arr];
  for (let i = newArr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
  }
  return newArr;
}

function startQuiz() {
  let bank = [];
  if (discipline === 'romana') bank = ROMANA;
  else if (discipline === 'istorie') bank = ISTORIE;
  else bank = [...ROMANA, ...shuffle(ISTORIE).slice(0, 30)];
  
  questions = shuffle(bank).slice(0, testSize);
  current = 0;
  score = 0;
  history = [];
  answered = false;
  
  document.getElementById('menu').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[current];
  const progress = ((current + 1) / questions.length) * 100;
  
  document.getElementById('pb').style.width = progress + '%';
  document.getElementById('ct').textContent = (current + 1) + ' / ' + questions.length;
  document.getElementById('qt').textContent = q.q;
  
  const optionsContainer = document.getElementById('an');
  optionsContainer.innerHTML = '';
  q.o.forEach((opt, i) => {
    const optDiv = document.createElement('div');
    optDiv.className = 'option';
    optDiv.textContent = String.fromCharCode(65 + i) + ') ' + opt;
    optDiv.addEventListener('click', () => selectAnswer(i));
    optionsContainer.appendChild(optDiv);
  });
  
  document.getElementById('fb').textContent = '';
  document.getElementById('fb').className = 'feedback';
  document.getElementById('next-btn').classList.remove('show');
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  
  const q = questions[current];
  const options = document.querySelectorAll('.option');
  options.forEach(o => o.classList.add('disabled'));
  
  const feedback = document.getElementById('fb');
  
  if (idx === q.a) {
    options[idx].classList.add('correct');
    score++;
    feedback.textContent = '✅ Corect!';
    feedback.className = 'feedback show ok';
  } else {
    options[idx].classList.add('wrong');
    options[q.a].classList.add('correct');
    feedback.textContent = '❌ Greșit. Corect: ' + String.fromCharCode(65 + q.a) + ') ' + q.o[q.a];
    feedback.className = 'feedback show ko';
  }
  
  history.push({
    q: q.q,
    userAnswer: idx,
    correctAnswer: q.a,
    correct: idx === q.a,
    options: q.o
  });
  
  document.getElementById('next-btn').classList.add('show');
}

function nextQuestion() {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    showQuestion();
  }
}

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('results').style.display = 'block';
  
  document.getElementById('sc').textContent = score + ' / ' + questions.length;
  document.getElementById('sv').textContent = score;
  
  const reviewContainer = document.getElementById('rv');
  reviewContainer.innerHTML = '';
  
  history.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'review-i ' + (item.correct ? 'ok' : 'ko');
    const qText = item.q.substring(0, 60) + (item.q.length > 60 ? '...' : '');
    div.innerHTML = `<strong>${i+1}.</strong> ${qText}<br><small>Tu: ${String.fromCharCode(65+item.userAnswer)}) ${item.options[item.userAnswer]}; Corect: ${String.fromCharCode(65+item.correctAnswer)}) ${item.options[item.correctAnswer]}</small>`;
    reviewContainer.appendChild(div);
  });
}

function goBack() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('menu').style.display = 'block';
}

setupEventListeners();
updateTestOptions();
</script>

</html>
